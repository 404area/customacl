; ==================== DNS 配置（国内优先加密 DoH） ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - time.apple.com
    - captive.apple.com
    - '*.apple.com'
    - push.apple.com
    - '*.icloud.com'
    - dns.google
    - dns.cloudflare.com
    - doh.cleanbrowsing.org
    - cleanbrowsing.org
; ==================== DNS 配置结束 ====================
