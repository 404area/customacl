;策略组定义 - 用不冲突的名字 + 指定自定义规则走对应节点组
custom_proxy_group=🚀 节点选择`select`[]🔯 香港故转`[]🔯 日本故转`[]🔯 加坡故转`[]⭐ 香港故转`[]⭐ 日本故转`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]🌐 其他地区`[]🏡 家宽节点`[]🛩️ 高速节点`[]🕊️便宜节点`[]🐸 手动切换`[]DIRECT`[]HY2专用`[]HY2测速`[]CF优选组`[]CF测速
custom_proxy_group=HY2专用`select`[]HY2负载`[]HY2故障`[]HY2测速`[]HY2-US`[]HY2-HK`[]DIRECT
custom_proxy_group=HY2负载`load-balance`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2故障`fallback`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2测速`url-test`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2-US`load-balance`(us大)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2-HK`load-balance`(hk大)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=CF优选组`select`[]CF负载`[]CF故障`[]CF测速`[]DIRECT
custom_proxy_group=CF负载`load-balance`(CF官方优选)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=CF故障`fallback`(CF官方优选)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=CF测速`url-test`(CF官方优选)`http://www.gstatic.com/generate_204`300,,50

; 关键：让 Panda规则 和 Panda下载规则 强制导向指定组（避免重名冲突）
custom_proxy_group=Panda规则`select`[]CF测速`[]CF优选组`[]DIRECT   ; panda.list 走 CF
custom_proxy_group=Panda下载规则`select`[]HY2测速`[]HY2专用`[]DIRECT   ; pandadownload.list 走 HY2

; 其他常用组（示例，可继续添加）
custom_proxy_group=📹 YouTube`select`[]🚀 节点选择`[]HY2测速`[]CF测速`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]HY2测速`[]HY2-HK`[]CF测速`[]🐸 手动切换
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]HY2测速`[]CF测速`[]🐸 手动切换
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]HY2测速`[]CF测速`[]🐸 手动切换
custom_proxy_group=🐸 手动切换`select`.*
custom_proxy_group=🇭🇰 香港节点`select`(hk大|香港)
custom_proxy_group=🇺🇲 美国节点`select`(us大|美国)

;启用自定义规则集
enable_rule_generator=true
overwrite_original_rules=true
