;策略组定义 - 全部改名避免任何重名
custom_proxy_group=🚀 节点选择`select`[]🔯 香港故转`[]🔯 日本故转`[]🔯 加坡故转`[]⭐ 香港故转`[]⭐ 日本故转`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 加坡节点`[]🇺🇲 美国节点`[]🌐 其他地区`[]🏡 家宽节点`[]🛩️ 高速节点`[]🕊️便宜节点`[]🐸 手动切换`[]DIRECT`[]HY2专用`[]HY2测速`[]CF专用组`[]CF测速组
custom_proxy_group=HY2专用`select`[]HY2负载`[]HY2故障`[]HY2测速`[]HY2-US`[]HY2-HK`[]DIRECT
custom_proxy_group=HY2负载`load-balance`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2故障`fallback`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2测速`url-test`(us大|hk大|大-node|大-20tb)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2-US`load-balance`(us大)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HY2-HK`load-balance`(hk大)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=CF专用组`select`[]CF负载`[]CF故障`[]CF测速组`[]DIRECT
custom_proxy_group=CF负载`load-balance`(CF官方优选|官方优选)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=CF故障`fallback`(CF官方优选|官方优选)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=CF测速组`url-test`(CF官方优选|官方优选)`http://www.gstatic.com/generate_204`300,,50

; 关键修复：自定义规则集流量强制导向对应类型节点组
custom_proxy_group=PandaCF规则`select`[]CF测速组`[]CF专用组`[]DIRECT   ; panda.list 强制走 CF
custom_proxy_group=PandaDL规则`select`[]HY2测速`[]HY2专用`[]DIRECT     ; pandadownload.list 强制走 HY2

; 其他组示例
custom_proxy_group=📹 YouTube`select`[]🚀 节点选择`[]HY2测速`[]CF测速组`[]🐸 手动切换`[]DIRECT
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]HY2测速`[]HY2-HK`[]CF测速组`[]🐸 手动切换
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]HY2测速`[]CF测速组`[]🐸 手动切换
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]HY2测速`[]CF测速组`[]🐸 手动切换
custom_proxy_group=🐸 手动切换`select`.*
custom_proxy_group=🇭🇰 香港节点`select`(hk大|香港)
custom_proxy_group=🇺🇲 美国节点`select`(us大|美国)

enable_rule_generator=true
overwrite_original_rules=true
