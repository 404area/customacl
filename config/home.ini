custom_proxy_group=HY2`select`[]HY2-负载均衡`[]HY2-故障转移`[]HY2-测速最优`[]HY2-US`[]HY2-HK`[]DIRECT
custom_proxy_group=HY2-负载均衡`load-balance`(大-node|大-20tb-node|us大|hk大)`http://www.gstatic.com/generate_204`300,,50
